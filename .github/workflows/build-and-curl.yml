name: Build and Curl

on:
  workflow_dispatch:
    inputs:
      run_terraform:
        description: Run Terraform custom action job
        required: false
        type: boolean
        default: false
      tf_stage:
        description: Terraform stage directory (currently stage1 only)
        required: false
        type: string
        default: stage1
      state_key:
        description: Unique Terraform backend state key prefix
        required: false
        type: string
        default: dswanberg

jobs:
  docker-build-curl-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build Docker image
        run: docker build -t pipeline-tests .

      - name: Run container
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          if [ -z "$DJANGO_SECRET_KEY" ]; then
            echo "DJANGO_SECRET_KEY secret is not set."
            exit 1
          fi
          docker run -d --rm \
            -p 8000:8000 \
            -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            --name pipeline-tests-container \
            pipeline-tests

      - name: Wait for app
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:8000 > /dev/null; then
              echo "App is reachable."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become reachable in time."
          docker logs pipeline-tests-container || true
          exit 1

      - name: Curl index page
        run: curl -fsS http://localhost:8000

  sbom-scan-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run custom SBOM scan action
        id: sbom_scan
        uses: ./.github/actions/sbom-scan
        with:
          requirements_path: requirements.txt
          sbom_path: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: project-sbom
          path: sbom.json
          compression-level: 0
          if-no-files-found: error

  terraform-stage-test:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_terraform == 'true' }}
    needs:
      - docker-build-curl-test
      - sbom-scan-test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run custom Terraform action
        uses: ./.github/actions/terraform
        with:
          arm_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          arm_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          arm_client_id: ${{ secrets.ARM_CLIENT_ID }}
          arm_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
          state_key: ${{ github.event.inputs.state_key }}
          tf_stage: ${{ github.event.inputs.tf_stage }}

  build-tag-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_terraform == 'true' }}
    needs:
      - terraform-stage-test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to ACR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ARM_CLIENT_ID }}
          password: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Build, tag, and push image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          docker build -t application-final .
          docker tag application-final "${ACR_LOGIN_SERVER}/final:latest"
          docker push "${ACR_LOGIN_SERVER}/final:latest"

  tf-stage-two:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_terraform == 'true' }}
    needs:
      - build-tag-push
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run custom Terraform action (stage2)
        uses: ./.github/actions/terraform
        with:
          arm_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          arm_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          arm_client_id: ${{ secrets.ARM_CLIENT_ID }}
          arm_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
          state_key: ${{ github.event.inputs.state_key }}
          tf_stage: stage2
          django_secret_key_prod: ${{ secrets['DJANGO_SECRET_KEY.prod'] }}
